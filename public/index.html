    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        @keyframes flicker {
            0%, 89%, 91%, 93%, 100% { opacity: 1; }
            90% { opacity: 0.15; }
            92% { opacity: 0.7; }
        }

        .flicker { animation: flicker 3.5s ease-in-out infinite; }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px 1px rgba(52, 211, 153, 0.7); }
            50% { opacity: 0.5; box-shadow: 0 0 3px 0px rgba(52, 211, 153, 0.3); }
        }

        .pulse-green { animation: pulse-green 2s ease-in-out infinite; }
    </style>

<body class="bg-slate-950 text-white h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 z-0 opacity-10" 
         style="background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 30px 30px;">
    </div>
    <div class="z-10 flex flex-col items-center max-w-2xl px-6 text-center space-y-8">
        <a href="https://github.com/vaultick" target="_blank" rel="noopener noreferrer" class="font-mono inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-500/5 text-xs text-emerald-400 hover:bg-emerald-500/10 hover:border-emerald-500/50 transition-colors cursor-pointer">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-green"></span>
            SYSTEM STATUS: <span class="text-emerald-300">INITIALIZING</span>
        </a>
        <div class="w-24 h-24 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-800 mb-4">
            <svg class="w-12 h-12 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-white leading-none">
            Your secrets, safe <span style="background: linear-gradient(to right, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">forever.</span><br>
            Even from us.
        </h1>
        <p class="text-lg text-slate-400 max-w-xl mx-auto leading-relaxed">
            The zero-knowledge vault for your digital legacy.
        </p>

        <form id="notifyForm" class="w-full max-w-md flex flex-col sm:flex-row gap-3 mt-4" 
              action="https://app.loops.so/api/newsletter-form/cmm7yg2dy039g0i22yt7dlj7e" method="POST">
            
            <input type="email" name="email" placeholder="Enter your email" required
                class="flex-1 bg-slate-900/50 border border-slate-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 placeholder-slate-600 transition-all">
            
            <input type="hidden" name="userGroup" value="Waitlist">

            <button type="submit" id="submitBtn"
                class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-6 py-3 rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                Notify Me
            </button>
        </form>

        <div id="successMessage" class="hidden mt-4 text-emerald-400 font-mono text-sm tracking-wide bg-emerald-950/30 border border-emerald-900 px-4 py-2 rounded-lg">
            ✓ ENCRYPTED CONNECTION ESTABLISHED. YOU ARE ON THE LIST.
        </div>

        <script>
            const form = document.getElementById('notifyForm');
            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const originalText = btn.innerText;
                btn.innerText = "Processing...";
                btn.disabled = true;

                const formData = new FormData(form);
                
                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: new URLSearchParams(formData)
                    });

                    if (response.ok) {
                        form.style.display = 'none'; // Hide the form
                        successMsg.classList.remove('hidden'); // Show the success message
                    } else {
                        const data = await response.json();
                        throw new Error(data.message || 'Submission failed');
                    }

                } catch (error) {
                    btn.innerText = "Error. Try again.";
                    btn.disabled = false;
                    console.error('Waitlist submission error:', error);
                }
            });
        </script>

        <div class="pt-8 flex gap-6 text-slate-600 text-sm font-medium">
            <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                End-to-End Encrypted
            </span>
            <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
                Time-Locked
            </span>
        </div>

    </div>
    <div class="absolute bottom-6 mono text-[10px] text-slate-700 uppercase tracking-widest">
        AES-256-GCM // ARGON2ID // NO RECOVERY // VAULTICK © 2026
    </div>
</body>
</html>
